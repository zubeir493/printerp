<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }

    body {
        background-color: rgba(255, 192, 203, 0.512);
    }

    .header {
        height: 50px;
        background: palevioletred;
        color: white;
        display: flex;
        align-items: center;
        gap: .75rem;
        padding-left: 1rem;
    }

    .pfp {
        height: 35px;
        width: 35px;
        border-radius: 50%;
        border: 2px solid;
    }

    span {
        font-weight: bold;
        font-size: 20px;
    }

    button {
        position: fixed;
        bottom: 5px;
        left: 5px;
        right: 5px;
        height: 50px;
        border: 2px solid whitesmoke;
        outline: none;
        background: rgb(255, 0, 98);
        font-family: Aeonik TRIAL;
        font-weight: 500;
        font-size: large;
        color: white;
        border-radius: 50px;
    }

    .msg-box {
        /* background: red; */
        height: calc(100vh - 110px);
    }
</style>

<body>
    <section>
        <div class="header">
            <img src="" class="pfp" />
            <span>أبو البرآء</span>
        </div>

        <div class="msg-box"></div>

        <button>Tell me something</button>

    </section>

    </script>

</html>
